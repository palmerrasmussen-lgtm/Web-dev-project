<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Practice Plan Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #e7f5e7, #cfe8cf);
      color: #1d2b1d;
    }

    .app-container {
      max-width: 800px;
      margin: 50px auto;
      background-color: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      line-height: 1.6;
    }

    .form-group {
      margin: 20px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #999;
    }

    button {
      background-color: #2f7a38;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #25602c;
    }

    .result-box {
      margin-top: 30px;
      padding: 20px;
      background-color: #f4fbf4;
      border-left: 6px solid #2f7a38;
      border-radius: 10px;
      display: none;
    }

    .back-links {
      text-align: center;
      margin-top: 25px;
    }

    .back-links a {
      display: inline-block;
      margin: 8px;
      padding: 10px 16px;
      background-color: #a8dba8;
      color: #163116;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .back-links a:hover {
      background-color: #92cb92;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1>Golf Practice Plan Generator</h1>
    <p>
      Pick the part of your game you want to improve and how much time you have.
      This app will generate a simple practice plan for you.
    </p>

    <div class="form-group">
      <label for="focus">What part of your game needs work?</label>
      <select id="focus">
        <option value="driving">Driving</option>
        <option value="irons">Iron Play</option>
        <option value="chipping">Chipping</option>
        <option value="putting">Putting</option>
      </select>
    </div>

    <div class="form-group">
      <label for="time">How much time do you have?</label>
      <select id="time">
        <option value="30">30 minutes</option>
        <option value="60">60 minutes</option>
        <option value="90">90 minutes</option>
      </select>
    </div>

    <button onclick="generatePlan()">Generate Practice Plan</button>

    <div class="result-box" id="resultBox">
      <h2>Your Practice Plan</h2>
      <p id="resultText"></p>
    </div>

    <div class="back-links">
      <a href="scratch.html">Back to Scratch Page</a>
      <a href="index.html">Back to Professional Home</a>
    </div>
  </div>

  <script>
    function generatePlan() {
      const focus = document.getElementById("focus").value;
      const time = document.getElementById("time").value;
      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");

      let plan = "";

      if (focus === "driving") {
        if (time === "30") {
          plan = "Spend 10 minutes warming up, 15 minutes focusing on smooth tempo with your driver, and 5 minutes finishing with controlled fairway finder swings.";
        } else if (time === "60") {
          plan = "Spend 10 minutes warming up, 20 minutes working on setup and alignment, 20 minutes focusing on consistent contact, and 10 minutes simulating tee shots on different holes.";
        } else {
          plan = "Spend 15 minutes warming up, 25 minutes working on alignment and ball position, 25 minutes on controlled power swings, and 25 minutes simulating real course tee shots with a pre-shot routine.";
        }
      } else if (focus === "irons") {
        if (time === "30") {
          plan = "Spend 10 minutes warming up, 10 minutes hitting short irons to targets, and 10 minutes focusing on clean contact with mid-irons.";
        } else if (time === "60") {
          plan = "Spend 10 minutes warming up, 20 minutes on short irons, 20 minutes on mid-irons, and 10 minutes on distance control to different targets.";
        } else {
          plan = "Spend 15 minutes warming up, 25 minutes with short irons, 25 minutes with mid-irons, and 25 minutes practicing target changes and simulated approach shots.";
        }
      } else if (focus === "chipping") {
        if (time === "30") {
          plan = "Spend 10 minutes on basic chip technique, 10 minutes landing chips on a consistent spot, and 10 minutes trying to finish close to the hole.";
        } else if (time === "60") {
          plan = "Spend 15 minutes on setup and contact, 20 minutes on different chip distances, 15 minutes on uphill and downhill lies, and 10 minutes playing a short game challenge.";
        } else {
          plan = "Spend 15 minutes on basic mechanics, 25 minutes on landing spot control, 25 minutes using different clubs around the green, and 25 minutes playing competitive up-and-down games.";
        }
      } else if (focus === "putting") {
        if (time === "30") {
          plan = "Spend 10 minutes on short putts, 10 minutes on distance control, and 10 minutes finishing with pressure putts inside 6 feet.";
        } else if (time === "60") {
          plan = "Spend 15 minutes on short putts, 20 minutes on lag putting, 15 minutes on breaking putts, and 10 minutes on a pressure putting challenge.";
        } else {
          plan = "Spend 15 minutes on short putt confidence, 25 minutes on distance control, 25 minutes on breaking putts, and 25 minutes doing a competitive drill where you must make multiple putts in a row.";
        }
      }

      resultText.textContent = plan;
      resultBox.style.display = "block";
    }
  </script>
</body>
</html>
