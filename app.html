<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters Trivia Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #e8f5e9, #cfe8cf);
      color: #1d2b1d;
    }

    .app-container {
      max-width: 850px;
      margin: 50px auto;
      background-color: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    h1, h2 {
      text-align: center;
    }

    p {
      text-align: center;
      line-height: 1.6;
    }

    .question-box {
      margin-top: 25px;
      padding: 20px;
      background-color: #f4fbf4;
      border-left: 6px solid #2f7a38;
      border-radius: 10px;
    }

    .question-box h3 {
      margin-top: 0;
    }

    .submit-btn, .restart-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background-color: #2f7a38;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    .submit-btn:hover, .restart-btn:hover {
      background-color: #25602c;
    }

    .result-box {
      margin-top: 30px;
      padding: 20px;
      background-color: #f4fbf4;
      border-left: 6px solid #2f7a38;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .back-links {
      text-align: center;
      margin-top: 25px;
    }

    .back-links a {
      display: inline-block;
      margin: 8px;
      padding: 10px 16px;
      background-color: #a8dba8;
      color: #163116;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .back-links a:hover {
      background-color: #92cb92;
    }

    label {
      display: block;
      margin: 8px 0;
      text-align: left;
    }

    input[type="radio"] {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1>Masters Trivia Game</h1>
    <p>
      Test your knowledge of one of golf’s most iconic tournaments.
    </p>

    <div id="quizArea"></div>

    <button class="submit-btn" onclick="checkAnswers()">Submit Answers</button>

    <div class="result-box" id="resultBox">
      <h2>Your Score</h2>
      <p id="resultText"></p>
      <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
    </div>

    <div class="back-links">
      <a href="scratch.html">Back to Scratch Page</a>
      <a href="index.html">Back to Professional Home</a>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "Where is the Masters Tournament played?",
        options: ["Pebble Beach", "Augusta National", "St. Andrews", "Torrey Pines"],
        answer: "Augusta National"
      },
      {
        question: "What is awarded to the winner of the Masters?",
        options: ["Claret Jug", "Wanamak­er Trophy", "Green Jacket", "Ryder Cup"],
        answer: "Green Jacket"
      },
      {
        question: "What famous stretch of holes at Augusta is especially well known?",
        options: ["Bear Trap", "Snake Pit", "Amen Corner", "Murderers’ Row"],
        answer: "Amen Corner"
      },
      {
        question: "What special dinner is held for past Masters champions?",
        options: ["Legends Dinner", "Champions Dinner", "Augusta Banquet", "Winners Feast"],
        answer: "Champions Dinner"
      },
      {
        question: "Which month is the Masters usually played in?",
        options: ["February", "April", "June", "September"],
        answer: "April"
      }
    ];

    function loadQuiz() {
      const quizArea = document.getElementById("quizArea");
      quizArea.innerHTML = "";

      questions.forEach((q, index) => {
        const questionBlock = document.createElement("div");
        questionBlock.className = "question-box";

        let optionsHTML = "";
        q.options.forEach(option => {
          optionsHTML += `
            <label>
              <input type="radio" name="question${index}" value="${option}">
              ${option}
            </label>
          `;
        });

        questionBlock.innerHTML = `
          <h3>Question ${index + 1}</h3>
          <p style="text-align:left;"><strong>${q.question}</strong></p>
          ${optionsHTML}
        `;

        quizArea.appendChild(questionBlock);
      });
    }

    function checkAnswers() {
      let score = 0;

      questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="question${index}"]:checked`);
        if (selected && selected.value === q.answer) {
          score++;
        }
      });

      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");

      resultText.textContent = `You got ${score} out of ${questions.length} correct.`;
      resultBox.style.display = "block";
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function restartQuiz() {
      loadQuiz();
      document.getElementById("resultBox").style.display = "none";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    loadQuiz();
  </script>
</body>
</html>
