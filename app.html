function get(key){return JSON.parse(localStorage.getItem(key)||"[]")}
function set(key,val){localStorage.setItem(key,JSON.stringify(val))}

function buildQuiz(){
  let used=get(USED);
  let last=get(LAST);

  let pool=questions.filter(q=>!used.includes(q.id));

  if(pool.length<10){
    used=[];
    set(USED,[]);
    pool=[...questions];
  }

  let selected=[];

  while(selected.length<10){
    let q=pool[Math.floor(Math.random()*pool.length)];
    if(!selected.includes(q) && !last.includes(q.id)){
      selected.push(q);
    }
  }

  set(LAST,selected.map(q=>q.id));
  set(USED,[...used,...selected.map(q=>q.id)]);

  return selected;
}

let current=buildQuiz();

function loadQuiz(){
  let html="";
  current.forEach((q,i)=>{
    html+=`<div class="question"><h3>${q.q}</h3>`;
    q.a.forEach(opt=>{
      html+=`<label><input type="radio" name="q${i}" value="${opt}">${opt}</label><br>`;
    });
    html+="</div>";
  });
  document.getElementById("quiz").innerHTML=html;
}

function submitQuiz(){
  let score=0;
  current.forEach((q,i)=>{
    let sel=document.querySelector(`input[name=q${i}]:checked`);
    if(sel && sel.value===q.c) score++;
  });
  document.getElementById("result").innerText=`Score: ${score}/10`;
}
