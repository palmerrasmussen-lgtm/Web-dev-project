    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
      }
      return shuffled;
    }

    function getStoredArray(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || [];
      } catch (e) {
        return [];
      }
    }

    function setStoredArray(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function buildQuestionSet() {
      let usedIds = getStoredArray(USED_STORAGE_KEY);
      const lastQuizIds = getStoredArray(LAST_QUIZ_STORAGE_KEY);

      const neverUsed = questionPool.filter(function(q) {
        return !usedIds.includes(q.id);
      });

      let selected = [];

      if (neverUsed.length >= QUESTIONS_PER_GAME) {
        let pool = neverUsed.filter(function(q) {
          return !lastQuizIds.includes(q.id);
        });

        if (pool.length < QUESTIONS_PER_GAME) {
          pool = neverUsed;
        }

        selected = shuffleArray(pool).slice(0, QUESTIONS_PER_GAME);
      } else {
        selected = neverUsed.slice();

        const remainingNeeded = QUESTIONS_PER_GAME - selected.length;

        let refillPool = questionPool.filter(function(q) {
          const alreadySelected = selected.some(function(s) { return s.id === q.id; });
          return !alreadySelected && !lastQuizIds.includes(q.id);
        });

        if (refillPool.length < remainingNeeded) {
          refillPool = questionPool.filter(function(q) {
            return !selected.some(function(s) { return s.id === q.id; });
          });
        }

        selected = selected.concat(shuffleArray(refillPool).slice(0, remainingNeeded));

        if (neverUsed.length === 0) {
          usedIds = [];
        }
      }

      const selectedIds = selected.map(function(q) { return q.id; });
      const updatedUsed = Array.from(new Set(usedIds.concat(selectedIds)));

      setStoredArray(USED_STORAGE_KEY, updatedUsed);
      setStoredArray(LAST_QUIZ_STORAGE_KEY, selectedIds);

      return selected.map(function(q) {
        return {
          id: q.id,
          question: q.question,
          answer: q.answer,
          shuffledOptions: shuffleArray(q.options)
        };
      });
    }

    function loadQuiz() {
      quizSubmitted = false;
      currentQuestions = buildQuestionSet();

      const quizArea = document.getElementById("quizArea");
      const submitBtn = document.getElementById("submitBtn");
      const resultBox = document.getElementById("resultBox");

      quizArea.innerHTML = "";
      submitBtn.disabled = false;
      resultBox.style.display = "none";

      currentQuestions.forEach(function(q, index) {
        const questionBlock = document.createElement("div");
        questionBlock.className = "question-box";

        let optionsHTML = "";
        q.shuffledOptions.forEach(function(option) {
          optionsHTML +=
            '<label class="option-label" data-question="' + index + '" data-option="' + option + '">' +
              '<input type="radio" name="question' + index + '" value="' + option + '">' +
              option +
            '</label>';
        });

        questionBlock.innerHTML =
          '<h3>Question ' + (index + 1) + '</h3>' +
          '<div class="question-text">' + q.question + '</div>' +
          optionsHTML +
          '<div class="answer-note" id="note' + index + '"></div>';

        quizArea.appendChild(questionBlock);
      });
    }

    function checkAnswers() {
      if (quizSubmitted) return;

      let score = 0;

      currentQuestions.forEach(function(q, index) {
        const selected = document.querySelector('input[name="question' + index + '"]:checked');
        const allInputs = document.querySelectorAll('input[name="question' + index + '"]');
        const allLabels = document.querySelectorAll('label[data-question="' + index + '"]');
        const note = document.getElementById("note" + index);

        allInputs.forEach(function(input) {
          input.disabled = true;
        });

        allLabels.forEach(function(label) {
          const labelOption = label.getAttribute("data-option");
          label.classList.add("dimmed");

          if (labelOption === q.answer) {
            label.classList.remove("dimmed");
            label.classList.add("correct");
          }

          if (selected && labelOption === selected.value && selected.value !== q.answer) {
            label.classList.remove("dimmed");
            label.classList.add("incorrect");
          }
        });

        if (selected && selected.value === q.answer) {
          score++;
          note.className = "answer-note correct-note";
          note.textContent = "Correct.";
        } else if (selected) {
          note.className = "answer-note incorrect-note";
          note.textContent = "Incorrect. The correct answer is " + q.answer + ".";
        } else {
          note.className = "answer-note incorrect-note";
          note.textContent = "No answer selected. The correct answer is " + q.answer + ".";
        }
      });

      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");
      const submitBtn = document.getElementById("submitBtn");

      let feedback = "";
      if (score === currentQuestions.length) {
        feedback = "Perfect round. Very Masters-worthy.";
      } else if (score >= 8) {
        feedback = "Great score. You know your Masters history.";
      } else if (score >= 5) {
        feedback = "Solid round. A little more Augusta knowledge and you are there.";
      } else {
        feedback = "Good start. Time to study up and make another run at it.";
      }

      resultText.textContent = "You got " + score + " out of " + currentQuestions.length + " correct. " + feedback;
      resultBox.style.display = "block";
      submitBtn.disabled = true;
      quizSubmitted = true;

      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function restartQuiz() {
      loadQuiz();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetQuestionHistory() {
      localStorage.removeItem(USED_STORAGE_KEY);
      localStorage.removeItem(LAST_QUIZ_STORAGE_KEY);
      restartQuiz();
    }

    loadQuiz();
  </script>
</body>
