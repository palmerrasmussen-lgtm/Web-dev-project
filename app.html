<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Masters Trivia</title>

  <style>
    body {
      font-family: Arial;
      background: #0f3b24;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      border-radius: 12px;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      border-radius: 8px;
      border: none;
      background: #2f7a38;
      color: white;
      cursor: pointer;
    }

    .correct { background: #d4edda; }
    .wrong { background: #f8d7da; }
  </style>
</head>

<body>

<h1>Masters Trivia</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit</button>

<h2 id="result"></h2>

<script>

const STORAGE_USED = "usedQuestions";
const STORAGE_LAST = "lastQuiz";

const questions = [
  {id:1,q:"Where is the Masters played?",a:["Augusta National","Pebble Beach","Torrey Pines"],c:"Augusta National"},
  {id:2,q:"What do winners receive?",a:["Green Jacket","Trophy","Medal"],c:"Green Jacket"},
  {id:3,q:"What month is the Masters played?",a:["April","June","August"],c:"April"},
  {id:4,q:"What is Amen Corner?",a:["Holes 11-13","Clubhouse","Practice Area"],c:"Holes 11-13"},
  {id:5,q:"Who picks Champions Dinner menu?",a:["Defending Champion","Fans","Officials"],c:"Defending Champion"},
  {id:6,q:"How many rounds?",a:["4","3","2"],c:"4"},
  {id:7,q:"What creek is famous?",a:["Rae’s Creek","Jordan Creek","Augusta Creek"],c:"Rae’s Creek"},
  {id:8,q:"What contest before Masters?",a:["Par 3","Long Drive","Putting"],c:"Par 3"},
  {id:9,q:"What makes Masters unique?",a:["Same course","Night play","Team event"],c:"Same course"},
  {id:10,q:"Low amateur award?",a:["Best amateur","Youngest player","Fastest round"],c:"Best amateur"},
  {id:11,q:"Hole players skip ball?",a:["16","12","18"],c:"16"},
  {id:12,q:"What are the Masters?",a:["Major","Minor","Qualifier"],c:"Major"}
];

function get(key){return JSON.parse(localStorage.getItem(key)||"[]")}
function set(key,val){localStorage.setItem(key,JSON.stringify(val))}

function getQuiz(){
  let used=get(STORAGE_USED);
  let last=get(STORAGE_LAST);

  let pool=questions.filter(q=>!used.includes(q.id));

  if(pool.length<5){
    used=[];
    set(STORAGE_USED,[]);
    pool=[...questions];
  }

  let selected=[];
  while(selected.length<5){
    let rand=pool[Math.floor(Math.random()*pool.length)];
    if(!selected.includes(rand)&&!last.includes(rand.id)){
      selected.push(rand);
    }
  }

  set(STORAGE_LAST,selected.map(q=>q.id));
  set(STORAGE_USED,[...used,...selected.map(q=>q.id)]);

  return selected;
}

let current=getQuiz();

function loadQuiz(){
  let html="";
  current.forEach((q,i)=>{
    html+=`<div class="box"><h3>${q.q}</h3>`;
    q.a.forEach(opt=>{
      html+=`<label><input type="radio" name="q${i}" value="${opt}">${opt}</label><br>`;
    });
    html+="</div>";
  });
  document.getElementById("quiz").innerHTML=html;
}

function submitQuiz(){
  let score=0;
  current.forEach((q,i)=>{
    let sel=document.querySelector(`input[name=q${i}]:checked`);
    if(sel && sel.value===q.c) score++;
  });
  document.getElementById("result").innerText=`Score: ${score}/${current.length}`;
}

loadQuiz();

</script>

</body>
</html>
